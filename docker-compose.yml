services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kb_new}
      POSTGRES_USER: ${POSTGRES_USER:-kb_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kb_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - kb_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kb_user} -d ${POSTGRES_DB:-kb_new}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Valkey (Redis-protocol compatible) — the caching layer. Tenant-scoped keys are
  # namespaced `tenant:{tenant_id}:...` to prevent cross-tenant cache bleed.
  cache:
    image: valkey/valkey:8-alpine
    ports:
      - "${CACHE_PORT:-6379}:6379"
    volumes:
      - kb_valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://kb_user:kb_password@db:5432/kb_new
      # ORM sessions connect as the non-superuser role so RLS applies. Run
      # `pnpm run docker:db:app-role` once to create it. Superuser URL above stays for
      # migrations/queue internals.
      APP_DATABASE_URL: postgresql+psycopg://kb_app:${APP_DB_PASSWORD:-kb_app_password}@db:5432/kb_new
      CACHE_URL: redis://cache:6379/0
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./apps/api:/app
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy

  # Ingestion worker: same image/code as the api, but runs the Procrastinate worker
  # instead of uvicorn. It consumes ingestion jobs from the Postgres-backed queue and
  # runs the extract -> chunk -> embed pipeline. Scale with `--scale worker=N`.
  worker:
    build:
      context: ./apps/api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://kb_user:kb_password@db:5432/kb_new
      APP_DATABASE_URL: postgresql+psycopg://kb_app:${APP_DB_PASSWORD:-kb_app_password}@db:5432/kb_new
      CACHE_URL: redis://cache:6379/0
    command: procrastinate --app=src.infrastructure.queue.app.app worker
    volumes:
      - ./apps/api:/app
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ./apps/web:/repo/apps/web
      - ./packages:/repo/packages
      - /repo/node_modules
      - /repo/apps/web/node_modules
    depends_on:
      - api

volumes:
  kb_postgres_data:
  kb_valkey_data:
